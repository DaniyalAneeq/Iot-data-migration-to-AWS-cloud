version: 2

models:
  - name: silver_iot_events
    columns:
      - name: event_id
        tests:
          - not_null
      - name: device_id
        tests:
          - not_null
      - name: latitude
        tests:
          - not_null
      - name: longitude
        tests:
          - not_null
      - name: data_quality_severity
        tests:
          - accepted_values:
              values: ['on_time', 'delayed', 'invalid_location']
